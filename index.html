<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #38bdf8;
        }

        .parent-card {
            display: flex;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #94a3b8;
            color: #fff;
            font-size: 14px;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            background: #1e293b;
            border: 1px solid #38bdf8;
        }

        .history button:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        #clearBtn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        #clearBtn:hover {
            background: #b91c1c;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #38bdf8;
            transition: 0.2s;
        }

        .weather-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .weather-item label {
            font-weight: 500;
            color: #94a3b8;
        }

        .weather-item span {
            font-weight: 600;
        }

        @media (max-width: 700px) {
            .parent-card {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>


        <button id="clearBtn">Clear History</button>
    </div>

    <script>
        const API_KEY = "14ac0ec299dff0bd71094539fe83cf5a";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );

            const data = await res.json();

            if (!res.ok) {
                throw new Error("City not found ❌");
            }

            return data;
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        function renderWeather(d) {
            weatherBox.innerHTML = `
            <div class="weather-item"><label>📍 City</label><span>${d.name}, ${d.sys.country}</span></div>
            <div class="weather-item"><label>🌡 Temperature</label><span>${d.main.temp} °C</span></div>
            <div class="weather-item"><label>🌤 Weather</label><span>${d.weather[0].main}</span></div>
            <div class="weather-item"><label>💧 Humidity</label><span>${d.main.humidity}%</span></div>
            <div class="weather-item"><label>🌬 Wind</label><span>${d.wind.speed} m/s</span></div>
        `;
        }

        function saveHistory(city) {
            if (!history.includes(city)) {
                history.unshift(city);
                localStorage.setItem("weatherHistory", JSON.stringify(history));
            }
            showHistory();
        }

        function showHistory() {
            historyBox.innerHTML = "";

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.innerText = city;

                btn.onclick = () => {
                    cityInput.value = city;
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        async function search(city) {
            weatherBox.innerHTML = "⏳ Loading...";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) search(city);
            }
        });

        showHistory();
        document.getElementById("clearBtn").onclick = function () {
            history = [];
            localStorage.removeItem("weatherHistory");

            document.getElementById("history").innerHTML = "";
        };
    </script>
</body>

</html>
